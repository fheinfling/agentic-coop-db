name: Feature request
description: Propose a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening a feature request, please check `docs/features/`. If
        the idea already lives there, comment on the existing doc instead of
        opening a duplicate issue.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user-facing problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposed
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: links
    attributes:
      label: Links
