# GitHub label inventory. Apply with:
#   gh label sync -f .github/labels.yml
# (using the EndBug/label-sync action or similar).

- name: bug
  color: d73a4a
  description: Something isn't working

- name: enhancement
  color: a2eeef
  description: New feature or improvement

- name: question
  color: d876e3
  description: Further information is requested

- name: documentation
  color: 0075ca
  description: Documentation improvements

- name: good first issue
  color: 7057ff
  description: Approachable for new contributors

- name: help wanted
  color: 008672
  description: Extra attention is needed

- name: security
  color: ee0701
  description: Security-relevant change or report

- name: dependencies
  color: 0366d6
  description: Updates to a dependency
