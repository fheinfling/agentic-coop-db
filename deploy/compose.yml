# Base compose stack — works in `docker compose` and (mostly) in `docker stack deploy`.
#
# This file is intentionally minimal. Profile-specific overrides live in
# compose.local.yml, compose.pi-lite.yml, compose.cloud.yml. Always pair this
# file with at least one override:
#
#   docker compose -f deploy/compose.yml -f deploy/compose.local.yml up -d
#
# The Makefile wraps this; see `make up-local`, `up-pi`, `up-cloud`.
#
# Roles / privilege boundaries (enforced by migration 0004):
#   - agentcoopdb_owner   — superuser-equivalent, used ONLY by migrations
#   - agentcoopdb_gateway — login role used by the api pool, no privileges of its own
#   - dbadmin / dbuser — built-in target roles assigned to API keys

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: agentcoopdb_owner
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB: agentcoopdb
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    secrets:
      - postgres_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentcoopdb_owner -d agentcoopdb"]
      interval: 5s
      timeout: 3s
      retries: 10
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true

  api:
    image: ghcr.io/fheinfling/agentic-coop-db-server:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AGENTCOOPDB_HTTP_ADDR: ":8080"
      AGENTCOOPDB_DATABASE_URL: "postgres://agentcoopdb_gateway@postgres:5432/agentcoopdb?sslmode=disable"
      AGENTCOOPDB_MIGRATIONS_DATABASE_URL: "postgres://agentcoopdb_owner@postgres:5432/agentcoopdb?sslmode=disable"
      AGENTCOOPDB_LOG_LEVEL: "info"
      AGENTCOOPDB_LOG_FORMAT: "json"
      AGENTCOOPDB_METRICS_ENABLED: "true"
    secrets:
      - postgres_password
    healthcheck:
      test: ["CMD", "/app/agentic-coop-db-server", "-version"]
      interval: 10s
      timeout: 3s
      retries: 5
    read_only: true
    tmpfs:
      - /tmp:size=16M
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true

volumes:
  postgres-data:

secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt
