# postgresql.conf — Raspberry Pi 4/5 (4 GB) tuning.
# Conservative defaults so a heavy query never OOMs the Pi.

listen_addresses           = '*'
shared_buffers             = 64MB
effective_cache_size       = 192MB
work_mem                   = 2MB
maintenance_work_mem       = 32MB
max_connections            = 40
max_worker_processes       = 4
max_parallel_workers       = 2
max_parallel_workers_per_gather = 1

wal_compression            = on
wal_buffers                = 4MB
synchronous_commit         = on
checkpoint_timeout         = 10min
checkpoint_completion_target = 0.9

# Logging — keep verbose enough that the audit log can be cross-referenced.
log_min_duration_statement = 500
log_statement              = 'ddl'
log_connections            = on
log_disconnections         = on
log_line_prefix            = '%m [%p] %q%u@%d '

# Security
password_encryption        = scram-sha-256
ssl                        = off
