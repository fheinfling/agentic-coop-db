global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    deployment: agentcoopdb-cloud

scrape_configs:
  - job_name: agentic-coop-db-api
    static_configs:
      - targets: ["api:8080"]
    metrics_path: /metrics

  - job_name: postgres-exporter
    static_configs:
      - targets: ["postgres-exporter:9187"]
