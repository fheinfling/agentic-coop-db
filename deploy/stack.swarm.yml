# Docker Swarm stack — pure swarm semantics (no `profiles:`, external secrets,
# placement constraints).
#
# Deploy with:
#   docker stack deploy -c deploy/stack.swarm.yml aicoldb
#
# Pre-requisites:
#   docker secret create aicoldb_postgres_password -
#   docker secret create aicoldb_restic_password -
#   docker network create --driver overlay --attachable aicoldb_frontend
#   docker network create --driver overlay --internal aicoldb_backend
#
# Single-node by default. For multi-node deployments use placement constraints
# to pin postgres to a single host with persistent storage.

version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: aicoldb_owner
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB: aicoldb
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - backend
    secrets:
      - source: aicoldb_postgres_password
        target: postgres_password
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any

  api:
    image: ghcr.io/fheinfling/aicoldb-server:latest
    environment:
      AICOLDB_HTTP_ADDR: ":8080"
      AICOLDB_DATABASE_URL: "postgres://aicoldb_gateway@postgres:5432/aicoldb?sslmode=disable"
      AICOLDB_MIGRATIONS_DATABASE_URL: "postgres://aicoldb_owner@postgres:5432/aicoldb?sslmode=disable"
      AICOLDB_LOG_FORMAT: "json"
      AICOLDB_METRICS_ENABLED: "true"
    networks:
      - frontend
      - backend
    secrets:
      - source: aicoldb_postgres_password
        target: postgres_password
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        order: start-first
      restart_policy:
        condition: any

volumes:
  postgres-data:

networks:
  frontend:
    external: true
    name: aicoldb_frontend
  backend:
    external: true
    name: aicoldb_backend

secrets:
  aicoldb_postgres_password:
    external: true
  aicoldb_restic_password:
    external: true
