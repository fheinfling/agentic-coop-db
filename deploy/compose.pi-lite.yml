# Raspberry Pi (ARM64, low-mem) override.
#
# Tunings:
#   - postgres uses postgresql.pi-lite.conf with shared_buffers=64MB,
#     effective_cache_size=192MB, work_mem=2MB, max_connections=40
#   - api pool size is reduced to 8
#   - everything is pinned to a memory ceiling so a hot query can't OOM the Pi

services:
  api:
    image: ghcr.io/fheinfling/agentic-coop-db-server:latest
    ports:
      - "8080:8080"
    environment:
      AGENTCOOPDB_DATABASE_MAX_CONNS: "8"
      AGENTCOOPDB_DATABASE_MIN_CONNS: "1"
      AGENTCOOPDB_RATE_LIMIT_PER_SECOND: "30"
      AGENTCOOPDB_RATE_LIMIT_BURST: "60"
      AGENTCOOPDB_INSECURE_HTTP: "true"
    deploy:
      resources:
        limits:
          memory: 256M

  postgres:
    # The base stack drops all caps and mounts a password secret. For trust
    # auth we need the init-time caps back, must unset the secret/password
    # file, and supply a dummy POSTGRES_PASSWORD (the entrypoint requires it
    # even though trust auth ignores it).
    cap_drop: !override []
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETUID
      - SETGID
    environment:
      POSTGRES_PASSWORD: "pi-only-not-a-real-password"
      POSTGRES_PASSWORD_FILE: ""
      POSTGRES_HOST_AUTH_METHOD: "trust"
    secrets: []
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/postgresql.pi-lite.conf:/etc/postgresql/postgresql.conf:ro
    command:
      - "postgres"
      - "-c"
      - "config_file=/etc/postgresql/postgresql.conf"
    deploy:
      resources:
        limits:
          memory: 512M
