# Local dev override.
#
# Differences from the base stack:
#   - api is built from the local source tree (not pulled from ghcr)
#   - api port 8080 is exposed on the host
#   - postgres port 5432 is exposed on the host (handy for psql/pgcli)
#   - INSECURE_HTTP=1 because there is no TLS terminator in front of us
#
# Used by `make up-local`.

services:
  api:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        VERSION: dev
        COMMIT: local
    image: agentic-coop-db-server:dev
    ports:
      - "8080:8080"
    environment:
      AGENTCOOPDB_INSECURE_HTTP: "true"
      AGENTCOOPDB_LOG_FORMAT: "text"
      AGENTCOOPDB_LOG_LEVEL: "debug"

  postgres:
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      # Local-only: use trust auth for in-cluster connections so neither
      # agentcoopdb_owner nor agentcoopdb_gateway needs a password. POSTGRES_PASSWORD
      # is still required by the postgres image's docker-entrypoint, but it
      # is never actually used as a credential when HOST_AUTH_METHOD=trust.
      POSTGRES_PASSWORD: "dev-only-not-a-real-password"
      POSTGRES_HOST_AUTH_METHOD: "trust"
    secrets: []
    command:
      - "postgres"
      - "-c"
      - "log_statement=ddl"
      - "-c"
      - "log_min_duration_statement=500"
