version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - gosec
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unconvert
    - unused

  settings:
    revive:
      rules:
        - name: var-naming
        - name: error-return
        - name: error-naming
        - name: exported
          arguments:
            - disableStutteringCheck
    gosec:
      excludes:
        - G204  # subprocess launched with variable - migrations CLI
        - G304  # file path provided as taint input - config files

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
